name: PlacesApp
options:
  bundleIdPrefix: com.places
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  PlacesApp:
    type: application
    platform: iOS
    sources:
      - path: PlacesApp
      - path: PlacesShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.places.monitor
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PlacesApp.entitlements
    dependencies:
      - target: PlacesWidget
        embed: true
    entitlements:
      path: PlacesApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.places.monitor

  PlacesWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PlacesWidget
      - path: PlacesShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.places.monitor.widget
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PlacesWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    info:
      path: PlacesWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: PlacesWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.places.monitor
